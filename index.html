<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideJot · 重置密码</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f5f1e8;
      --paper-dark: #ebe5d3;
      --ink: #2a2622;
      --ink-soft: #6b6359;
      --accent: #c8553d;
      --accent-soft: #e8a598;
      --ok: #5a7c4f;
      --line: rgba(42, 38, 34, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-image:
        radial-gradient(ellipse at top left, rgba(200, 85, 61, 0.06), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(90, 124, 79, 0.05), transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .sheet {
      background: #fdfbf5;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 440px;
      width: 100%;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.8) inset,
        0 30px 60px -20px rgba(42, 38, 34, 0.18),
        0 8px 20px -8px rgba(42, 38, 34, 0.12);
      position: relative;
    }
    .sheet::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 6px;
      background: var(--accent);
      opacity: 0.85;
      border-radius: 0 0 2px 2px;
    }
    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .lede {
      color: var(--ink-soft);
      font-size: 0.95rem;
      line-height: 1.55;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.5rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--ink);
      transition: border-color 0.2s, background 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }
    .field { margin-bottom: 1.25rem; }
    .hint {
      font-size: 0.78rem;
      color: var(--ink-soft);
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
    }
    button {
      width: 100%;
      padding: 0.95rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    button:hover:not(:disabled) { background: var(--accent); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 1.25rem;
      padding: 0.85rem 1rem;
      border-radius: 3px;
      font-size: 0.88rem;
      line-height: 1.5;
      display: none;
    }
    .msg.show { display: block; }
    .msg.err {
      background: rgba(200, 85, 61, 0.08);
      border-left: 3px solid var(--accent);
      color: var(--accent);
    }
    .msg.ok {
      background: rgba(90, 124, 79, 0.08);
      border-left: 3px solid var(--ok);
      color: var(--ok);
    }
    .footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px dashed var(--line);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
      text-align: center;
    }
    .success-state h1 { color: var(--ok); }
    .success-state .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <main class="sheet" id="card">
    <div class="brand">SideJot · 密码重置</div>
    <h1 id="title">设置新密码</h1>
    <p class="lede" id="lede">请输入你想要的新密码。完成后回到 SideJot 浏览器扩展，使用新密码登录。</p>

    <form id="form">
      <div class="field">
        <label for="pw1">新密码</label>
        <input type="password" id="pw1" autocomplete="new-password" required minlength="6" />
        <div class="hint">至少 6 个字符</div>
      </div>
      <div class="field">
        <label for="pw2">再次输入</label>
        <input type="password" id="pw2" autocomplete="new-password" required minlength="6" />
      </div>
      <button type="submit" id="submit">确认重置</button>
    </form>

    <div class="msg err" id="err"></div>
    <div class="msg ok" id="ok"></div>

    <div class="footer">tszxy0305@gmail.com · sidejot</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mrckbvbnfrvsmbvkhsvp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_5X6rWRYaOPSPVRYfhl6nOA_yjBqQW8A';

    const form = document.getElementById('form');
    const pw1 = document.getElementById('pw1');
    const pw2 = document.getElementById('pw2');
    const submitBtn = document.getElementById('submit');
    const errEl = document.getElementById('err');
    const okEl = document.getElementById('ok');
    const card = document.getElementById('card');
    const title = document.getElementById('title');
    const lede = document.getElementById('lede');

    function showErr(t) {
      okEl.classList.remove('show');
      errEl.textContent = t;
      errEl.classList.add('show');
    }
    function showOk(t) {
      errEl.classList.remove('show');
      okEl.textContent = t;
      okEl.classList.add('show');
    }

    // Supabase recovery flow puts a token in the URL hash like:
    //   #access_token=...&refresh_token=...&type=recovery
    // The supabase-js client picks this up automatically when detectSessionInUrl is true.
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: false,
        persistSession: false,
        detectSessionInUrl: true,
      },
    });

    // Wait briefly for the client to parse the recovery token from the URL.
    let recoveryReady = false;
    client.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
        recoveryReady = true;
      }
    });

    // Fallback: if no token in URL after a moment, the link is invalid.
    setTimeout(() => {
      if (!recoveryReady && !window.location.hash.includes('access_token')) {
        showErr('链接无效或已过期。请回到 SideJot 重新申请密码重置邮件。');
        submitBtn.disabled = true;
      }
    }, 1500);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('show');
      okEl.classList.remove('show');

      if (pw1.value !== pw2.value) {
        showErr('两次输入的密码不一致');
        return;
      }
      if (pw1.value.length < 6) {
        showErr('密码至少 6 个字符');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '处理中...';
      try {
        const { error } = await client.auth.updateUser({ password: pw1.value });
        if (error) throw error;

        // Success — replace the form with a success state
        card.classList.add('success-state');
        title.innerHTML = '<span class="icon">✓</span>密码已重置';
        lede.textContent = '你的密码已成功更新。请关闭此页面，回到 SideJot 浏览器扩展，使用新密码登录。';
        form.style.display = 'none';
        errEl.classList.remove('show');
        okEl.classList.remove('show');
      } catch (err) {
        const m = (err?.message || String(err)).toLowerCase();
        if (m.includes('expired') || m.includes('invalid')) {
          showErr('链接已过期。请回到 SideJot 重新申请密码重置邮件。');
        } else if (m.includes('same') || m.includes('different from')) {
          showErr('新密码不能和旧密码相同');
        } else {
          showErr('重置失败：' + (err?.message || '未知错误'));
        }
        submitBtn.disabled = false;
        submitBtn.textContent = '确认重置';
      }
    });
  </script>
</body>
</html>
