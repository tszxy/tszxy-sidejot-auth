<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideJot · Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f5f1e8;
      --paper-dark: #ebe5d3;
      --ink: #2a2622;
      --ink-soft: #6b6359;
      --accent: #c8553d;
      --ok: #5a7c4f;
      --line: rgba(42, 38, 34, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-image:
        radial-gradient(ellipse at top left, rgba(200, 85, 61, 0.06), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(90, 124, 79, 0.05), transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .lang-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      display: flex;
      background: #fdfbf5;
      border: 1px solid var(--line);
      border-radius: 3px;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      box-shadow: 0 2px 8px -2px rgba(42, 38, 34, 0.1);
    }
    .lang-toggle button {
      background: transparent;
      border: none;
      padding: 0.5rem 0.85rem;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    .lang-toggle button:hover { color: var(--ink); }
    .lang-toggle button.active {
      background: var(--ink);
      color: var(--paper);
    }
    .lang-toggle button + button { border-left: 1px solid var(--line); }
    .sheet {
      background: #fdfbf5;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 440px;
      width: 100%;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.8) inset,
        0 30px 60px -20px rgba(42, 38, 34, 0.18),
        0 8px 20px -8px rgba(42, 38, 34, 0.12);
      position: relative;
    }
    .sheet::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 6px;
      background: var(--accent);
      opacity: 0.85;
      border-radius: 0 0 2px 2px;
    }
    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .lede {
      color: var(--ink-soft);
      font-size: 0.95rem;
      line-height: 1.55;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.5rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      color: var(--ink);
      transition: border-color 0.2s, background 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
    }
    .field { margin-bottom: 1.25rem; }
    .hint {
      font-size: 0.78rem;
      color: var(--ink-soft);
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
    }
    button.primary {
      width: 100%;
      padding: 0.95rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    button.primary:hover:not(:disabled) { background: var(--accent); }
    button.primary:active:not(:disabled) { transform: translateY(1px); }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 1.25rem;
      padding: 0.85rem 1rem;
      border-radius: 3px;
      font-size: 0.88rem;
      line-height: 1.5;
      display: none;
    }
    .msg.show { display: block; }
    .msg.err {
      background: rgba(200, 85, 61, 0.08);
      border-left: 3px solid var(--accent);
      color: var(--accent);
    }
    .msg.ok {
      background: rgba(90, 124, 79, 0.08);
      border-left: 3px solid var(--ok);
      color: var(--ok);
    }
    .footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px dashed var(--line);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
      text-align: center;
    }
    .success-state h1 { color: var(--ok); }
    .success-state .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="lang-toggle" role="group" aria-label="Language">
    <button type="button" data-lang="zh">中</button>
    <button type="button" data-lang="en">EN</button>
  </div>

  <main class="sheet" id="card">
    <div class="brand" data-i18n="brand">SideJot · 密码重置</div>
    <h1 id="title" data-i18n="title">设置新密码</h1>
    <p class="lede" id="lede" data-i18n="lede">请输入你想要的新密码。完成后回到 SideJot 浏览器扩展，使用新密码登录。</p>

    <form id="form">
      <div class="field">
        <label for="pw1" data-i18n="pw1Label">新密码</label>
        <input type="password" id="pw1" autocomplete="new-password" required minlength="6" />
        <div class="hint" data-i18n="pwHint">至少 6 个字符</div>
      </div>
      <div class="field">
        <label for="pw2" data-i18n="pw2Label">再次输入</label>
        <input type="password" id="pw2" autocomplete="new-password" required minlength="6" />
      </div>
      <button type="submit" class="primary" id="submit" data-i18n="submit">确认重置</button>
    </form>

    <div class="msg err" id="err"></div>
    <div class="msg ok" id="ok"></div>

    <div class="footer">tszxy0305@gmail.com · sidejot</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // === i18n strings ===
    const I18N = {
      zh: {
        pageTitle: 'SideJot · 重置密码',
        brand: 'SideJot · 密码重置',
        title: '设置新密码',
        lede: '请输入你想要的新密码。完成后回到 SideJot 浏览器扩展，使用新密码登录。',
        pw1Label: '新密码',
        pw2Label: '再次输入',
        pwHint: '至少 6 个字符',
        submit: '确认重置',
        submitting: '处理中...',
        mismatch: '两次输入的密码不一致',
        tooShort: '密码至少 6 个字符',
        invalidLink: '链接无效或已过期。请回到 SideJot 重新申请密码重置邮件。',
        expired: '链接已过期。请回到 SideJot 重新申请密码重置邮件。',
        sameAsOld: '新密码不能和旧密码相同',
        failPrefix: '重置失败：',
        unknown: '未知错误',
        successTitle: '密码已重置',
        successLede: '你的密码已成功更新。请关闭此页面，回到 SideJot 浏览器扩展，使用新密码登录。',
      },
      en: {
        pageTitle: 'SideJot · Reset Password',
        brand: 'SideJot · Password Reset',
        title: 'Set a new password',
        lede: 'Enter a new password below. When done, return to the SideJot browser extension and sign in with your new password.',
        pw1Label: 'New password',
        pw2Label: 'Confirm password',
        pwHint: 'At least 6 characters',
        submit: 'Reset password',
        submitting: 'Working...',
        mismatch: 'Passwords do not match',
        tooShort: 'Password must be at least 6 characters',
        invalidLink: 'Link is invalid or expired. Please request a new reset email from SideJot.',
        expired: 'This link has expired. Please request a new reset email from SideJot.',
        sameAsOld: 'New password must be different from the old one',
        failPrefix: 'Reset failed: ',
        unknown: 'unknown error',
        successTitle: 'Password reset',
        successLede: 'Your password has been updated. Close this page and sign in to the SideJot extension with your new password.',
      },
    };

    // === Language detection & switching ===
    const STORAGE_KEY = 'sidejot_auth_lang';
    function detectLang() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved === 'zh' || saved === 'en') return saved;
      } catch (e) {}
      const nav = (navigator.language || 'en').toLowerCase();
      return nav.startsWith('zh') ? 'zh' : 'en';
    }

    let currentLang = detectLang();
    let inSuccessState = false;

    function applyLang(lang) {
      currentLang = lang;
      try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
      const t = I18N[lang];
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.title = t.pageTitle;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });
      // If we're already in success state, also re-render the success copy
      if (inSuccessState) {
        const titleEl = document.getElementById('title');
        const ledeEl = document.getElementById('lede');
        titleEl.innerHTML = '<span class="icon">✓</span>' + t.successTitle;
        ledeEl.textContent = t.successLede;
      }
      document.querySelectorAll('.lang-toggle button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    document.querySelectorAll('.lang-toggle button').forEach((btn) => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });

    applyLang(currentLang);

    // === Supabase reset flow ===
    const SUPABASE_URL = 'https://mrckbvbnfrvsmbvkhsvp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_5X6rWRYaOPSPVRYfhl6nOA_yjBqQW8A';

    const form = document.getElementById('form');
    const pw1 = document.getElementById('pw1');
    const pw2 = document.getElementById('pw2');
    const submitBtn = document.getElementById('submit');
    const errEl = document.getElementById('err');
    const okEl = document.getElementById('ok');
    const card = document.getElementById('card');
    const titleEl = document.getElementById('title');
    const ledeEl = document.getElementById('lede');

    function t(key) { return I18N[currentLang][key]; }

    function showErr(text) {
      okEl.classList.remove('show');
      errEl.textContent = text;
      errEl.classList.add('show');
    }

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: false,
        persistSession: false,
        detectSessionInUrl: true,
      },
    });

    let recoveryReady = false;
    client.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
        recoveryReady = true;
      }
    });

    setTimeout(() => {
      if (!recoveryReady && !window.location.hash.includes('access_token')) {
        showErr(t('invalidLink'));
        submitBtn.disabled = true;
      }
    }, 1500);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('show');
      okEl.classList.remove('show');

      if (pw1.value !== pw2.value) { showErr(t('mismatch')); return; }
      if (pw1.value.length < 6)    { showErr(t('tooShort')); return; }

      submitBtn.disabled = true;
      const originalLabel = submitBtn.textContent;
      submitBtn.textContent = t('submitting');
      try {
        const { error } = await client.auth.updateUser({ password: pw1.value });
        if (error) throw error;

        // Success — switch to success state. Mark titleEl/ledeEl with new
        // i18n keys so language switching keeps working in the success view.
        inSuccessState = true;
        card.classList.add('success-state');
        titleEl.setAttribute('data-i18n', 'successTitle');
        ledeEl.setAttribute('data-i18n', 'successLede');
        titleEl.innerHTML = '<span class="icon">✓</span>' + t('successTitle');
        ledeEl.textContent = t('successLede');
        form.style.display = 'none';
        errEl.classList.remove('show');
        okEl.classList.remove('show');
      } catch (err) {
        const m = (err?.message || String(err)).toLowerCase();
        if (m.includes('expired') || m.includes('invalid')) {
          showErr(t('expired'));
        } else if (m.includes('same') || m.includes('different from')) {
          showErr(t('sameAsOld'));
        } else {
          showErr(t('failPrefix') + (err?.message || t('unknown')));
        }
        submitBtn.disabled = false;
        submitBtn.textContent = originalLabel;
      }
    });
  </script>
</body>
</html>
